version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directories:
      - /client
      - /server
      - /indexer
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
